# yaml-language-server: $schema=https://raw.githubusercontent.com/Nya-Foundation/NyaProxy/main/nya/schema.json
# Safe starter configuration. Replace both placeholder keys before proxying.

server:
  # Authentication is disabled until a key is set. First run binds to
  # 127.0.0.1; set a strong key before using --host 0.0.0.0.
  api_key:
  logging:
    enabled: true
    level: info # debug logs request/response metadata; enable only when needed
    log_file: app.log
  proxy:
    enabled: false
    address: socks5://username:password@proxy.example.com:1080
  dashboard:
    enabled: true
  trusted_proxies: []
  cors:
    allow_origins: ["*"]
    allow_credentials: false
    allow_methods: ["GET", "POST", "PUT", "DELETE", "PATCH", "HEAD", "OPTIONS"]
    allow_headers: ["*"]

# Default configuration applied to all API endpoints unless overridden
default_settings:
  key_variable: keys
  key_concurrency: true
  randomness: 0.0
  load_balancing_strategy: round_robin
  # Path and method filtering
  allowed_paths:
    enabled: false # Set to true to enable request path filtering
    mode: whitelist # if "whitelist", only allow listed paths; if "blacklist", block listed paths
    paths:
      - "*"
  allowed_methods: ["GET", "POST", "PUT", "DELETE", "PATCH", "HEAD", "OPTIONS"]
  queue:
    max_size: 200
    max_workers: 10
    expiry_seconds: 300
  rate_limit:
    enabled: false
    endpoint_rate_limit: "0"
    key_rate_limit: "0"
    ip_rate_limit: "0"
    user_rate_limit: "0"
    rate_limit_paths:
      - "*"
  retry:
    enabled: true
    attempts: 3
    retry_after_seconds: 1
    retry_request_methods: [POST, GET, PUT, DELETE, PATCH]
    retry_status_codes: [429, 500, 502, 503, 504]
  # Optional credential quarantine. This is independent of retry: add a
  # matching status to retry.retry_status_codes if the current request should
  # also rotate immediately to another key.
  key_blocking:
    enabled: false
    status_codes: [403]
    duration_seconds: 300
  timeouts:
    request_timeout_seconds: 300

apis:
  example_service:
    name: Example Service
    endpoint: https://api.example.com/v1
    aliases:
      - example
    headers:
      Authorization: 'Bearer ${{keys}}'
    variables:
      keys:
        - replace-with-upstream-key
