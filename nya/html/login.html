<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NyaProxy — Sign in</title>
    <link rel="icon" href="/dashboard/favicon.ico" />
    <script>
      (function () {
        var t = localStorage.getItem("nyaproxy-theme") || "dark";
        document.documentElement.setAttribute("data-theme", t);
      })();
    </script>
    <style>
      /* Self-contained: the login page is served before authentication,
         so it cannot load the dashboard's shared stylesheet. */
      :root,
      [data-theme="dark"] {
        --bg: #0d0f14;
        --bg-elevated: #161922;
        --border: #262b38;
        --text: #e6e8ed;
        --text-muted: #9ba1b0;
        --text-faint: #646b7d;
        --accent: #6366f1;
        --accent-hover: #818cf8;
        --accent-soft: rgba(99, 102, 241, 0.16);
        --danger: #f87171;
        --danger-soft: rgba(248, 113, 113, 0.15);
        --shadow: 0 12px 32px rgba(0, 0, 0, 0.55);
      }
      [data-theme="light"] {
        --bg: #f4f5f7;
        --bg-elevated: #ffffff;
        --border: #e3e5ea;
        --text: #1a1d23;
        --text-muted: #5b616e;
        --text-faint: #8b909d;
        --accent: #4f46e5;
        --accent-hover: #4338ca;
        --accent-soft: rgba(79, 70, 229, 0.1);
        --danger: #dc2626;
        --danger-soft: rgba(220, 38, 38, 0.1);
        --shadow: 0 12px 32px rgba(0, 0, 0, 0.16);
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI",
          Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: 14px;
        box-shadow: var(--shadow);
        width: 100%;
        max-width: 380px;
        padding: 32px 28px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        justify-content: center;
      }
      .brand img {
        width: 30px;
        height: 30px;
      }
      .brand span {
        font-size: 1.15rem;
        font-weight: 650;
      }
      .sub {
        text-align: center;
        color: var(--text-muted);
        font-size: 0.85rem;
        margin: 8px 0 24px;
      }
      label {
        display: block;
        font-size: 0.78rem;
        font-weight: 500;
        color: var(--text-muted);
        margin-bottom: 6px;
      }
      input[type="password"] {
        width: 100%;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        font-size: 0.9rem;
        padding: 10px 12px;
        transition: border-color 0.12s ease, box-shadow 0.12s ease;
      }
      input[type="password"]:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
      }
      button[type="submit"] {
        width: 100%;
        margin-top: 16px;
        padding: 10px;
        font-size: 0.9rem;
        font-weight: 600;
        color: #fff;
        background: var(--accent);
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: background-color 0.12s ease;
      }
      button[type="submit"]:hover {
        background: var(--accent-hover);
      }
      button[type="submit"]:disabled {
        opacity: 0.6;
        cursor: progress;
      }
      .error {
        display: none;
        margin-top: 14px;
        font-size: 0.82rem;
        color: var(--danger);
        background: var(--danger-soft);
        border-radius: 8px;
        padding: 9px 12px;
      }
      .theme-toggle {
        position: fixed;
        top: 18px;
        right: 18px;
        width: 34px;
        height: 34px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--bg-elevated);
        color: var(--text-muted);
        cursor: pointer;
      }
      .theme-toggle svg {
        width: 17px;
        height: 17px;
      }
    </style>
  </head>
  <body>
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
      <svg class="icon-moon" viewBox="0 0 20 20" fill="currentColor">
        <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z" />
      </svg>
      <svg class="icon-sun" viewBox="0 0 20 20" fill="currentColor" style="display: none">
        <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd" />
      </svg>
    </button>

    <div class="card">
      <div class="brand">
        <img src="/dashboard/static/logo.svg" alt="" />
        <span>NyaProxy</span>
      </div>
      <p class="sub">Sign in to access the dashboard</p>

      <form id="login-form" method="post" action="javascript:void(0);">
        <label for="api-key">API key</label>
        <input type="password" id="api-key" name="apiKey" required autocomplete="off" placeholder="Enter your API key" />
        <button type="submit" id="submit-btn">Sign in</button>
      </form>
      <div id="error" class="error"></div>
    </div>

    <script>
      const root = document.documentElement;
      const toggle = document.getElementById("theme-toggle");
      const moon = toggle.querySelector(".icon-moon");
      const sun = toggle.querySelector(".icon-sun");

      function applyTheme(theme) {
        root.setAttribute("data-theme", theme);
        localStorage.setItem("nyaproxy-theme", theme);
        const dark = theme === "dark";
        moon.style.display = dark ? "" : "none";
        sun.style.display = dark ? "none" : "";
      }
      applyTheme(localStorage.getItem("nyaproxy-theme") || "dark");
      toggle.addEventListener("click", () =>
        applyTheme(root.getAttribute("data-theme") === "dark" ? "light" : "dark")
      );

      document
        .getElementById("login-form")
        .addEventListener("submit", function () {
          const key = document.getElementById("api-key").value;
          const btn = document.getElementById("submit-btn");
          const error = document.getElementById("error");
          btn.disabled = true;
          error.style.display = "none";
          try {
            document.cookie =
              "nyaproxy_api_key=" +
              key +
              "; path=/; max-age=7200; SameSite=Strict";
            window.location.href = "{{ return_path }}";
          } catch (e) {
            error.textContent = "Authentication failed. Please try again.";
            error.style.display = "block";
            btn.disabled = false;
          }
        });
    </script>
  </body>
</html>
