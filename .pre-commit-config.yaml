# Pre-commit hooks for NyaProxy.
# Install once with:  pre-commit install
# Run on all files:   pre-commit run --all-files
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.22
    hooks:
      - id: ruff-check
        args: ["--fix"]
      - id: ruff-format

  # mypy runs via the project interpreter so it picks up the `files`
  # ratchet configured in pyproject.toml [tool.mypy].
  - repo: local
    hooks:
      - id: mypy
        name: mypy (type-clean modules)
        entry: python -m mypy
        language: system
        pass_filenames: false
        types: [python]
