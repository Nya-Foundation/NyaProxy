name: CI - Quality

on:
  push:
    branches: [dev, staging]
  pull_request:
    branches: [dev, staging, main]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Style, types, and package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install quality tools
        run: python -m pip install -e ".[dev,lint]"

      - name: Lint and check formatting with Ruff
        run: make lint

      - name: Type check
        run: make typecheck

      - name: Build and smoke-test the wheel
        run: |
          make build
          python -m pip install --force-reinstall --no-deps dist/*.whl
          nyaproxy --version
          python -c "from importlib.resources import files; assert (files('nya') / 'config.yaml').is_file(); assert (files('nya') / 'schema.json').is_file()"

  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run tests with coverage
        run: python -m pytest --cov-report=xml --cov-fail-under=90

      - name: Upload coverage
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@v5
        with:
          files: ./reports/coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          flags: tests
