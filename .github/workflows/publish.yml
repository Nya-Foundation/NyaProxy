name: CI - Publish and Release

on:
  push:
    branches: [main]
    paths:
      - 'nya/**'
      - 'Dockerfile'
      - '.dockerignore'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/test.yml'
      - '.github/workflows/publish.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-release
  cancel-in-progress: false

jobs:
  quality:
    uses: ./.github/workflows/test.yml
    secrets: inherit

  publish:
    needs: quality
    runs-on: ubuntu-latest
    environment: Publish and Release
    permissions:
      contents: write
      id-token: write
      packages: write
    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ steps.generate-token.outputs.token }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Create release
        id: semantic-release
        uses: python-semantic-release/python-semantic-release@v9
        with:
          github_token: ${{ steps.generate-token.outputs.token }}

      - name: Publish package to PyPI
        if: steps.semantic-release.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true

      - name: Set image names
        if: steps.semantic-release.outputs.released == 'true'
        run: |
          GITHUB_IMG="${{ vars.GCR_IMAGE_NAME || github.repository }}"
          DOCKERHUB_IMG="${{ vars.DOCKERHUB_IMAGE_NAME || 'k3scat/nya-proxy' }}"
          echo "GCR_IMAGE_NAME=${GITHUB_IMG,,}" >> "$GITHUB_ENV"
          echo "DOCKERHUB_IMAGE_NAME=${DOCKERHUB_IMG,,}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        if: steps.semantic-release.outputs.released == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.semantic-release.outputs.released == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.semantic-release.outputs.released == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        if: steps.semantic-release.outputs.released == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.semantic-release.outputs.released == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.DOCKERHUB_IMAGE_NAME }}:latest
            ${{ env.DOCKERHUB_IMAGE_NAME }}:${{ steps.semantic-release.outputs.version }}
            ghcr.io/${{ env.GCR_IMAGE_NAME }}:latest
            ghcr.io/${{ env.GCR_IMAGE_NAME }}:${{ steps.semantic-release.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=NyaProxy
            org.opencontainers.image.description=A lightweight API gateway with credential rotation
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.semantic-release.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Scan Docker image
        if: steps.semantic-release.outputs.released == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKERHUB_IMAGE_NAME }}:${{ steps.semantic-release.outputs.version }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
