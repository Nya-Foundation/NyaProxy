[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
asyncio_mode = auto
python_functions = test_*
addopts = --cov=nya --cov-report=term-missing
markers =
    unit: mark a test as a unit test
    integration: mark a test as an integration test
    e2e: mark a test as an end-to-end test that starts local HTTP servers
    slow: mark a test that might be slow to run
